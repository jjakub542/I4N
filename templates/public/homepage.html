<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ content.title|default:"Nuclear Fact Checker" }}</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>

    <header>
        <h1>{{ content.title|default:"Nuclear Fact Checker" }}</h1>
        <p>{{ content.subtitle|default:"Independent verification of nuclear energy information" }}</p>
    </header>

    <section>
        <h2>Search Verified Information</h2>
        <form action="/search/" method="get">
            <input type="text" name="q" placeholder="Search facts, claims, topics...">
            <button type="submit">Search</button>
        </form>
    </section>

    <section>
        <h2>Submit a Claim</h2>
        <p>Found misinformation or unclear nuclear-related statement?</p>
        <a href="/reports/submit/">Submit a report</a>
    </section>

</body>

</html>
